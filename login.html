<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Student Portfolio & Verification System</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="registration-container">
    <div class="card">
      <h1>Login</h1>
      <p class="subtitle">Access your dashboard based on your role</p>

      <div class="page-nav">
        <a class="nav-link" href="index.html"><i class="fas fa-user-tie"></i> Recruiter</a>
        <a class="nav-link" href="student.html"><i class="fas fa-user-graduate"></i> Student</a>
        <a class="nav-link" href="faculty.html"><i class="fas fa-chalkboard-teacher"></i> Faculty</a>
        <a class="nav-link" href="admin.html"><i class="fas fa-shield-alt"></i> Admin</a>
      </div>

      <form id="loginForm">
        <div id="loginMessage" class="form-message" role="alert" aria-live="polite"></div>

        <div class="form-section">
          <h3>Login Details</h3>
          <div class="form-group">
            <label for="loginEmail">Email</label>
            <div class="input-wrapper">
              <i class="fas fa-envelope"></i>
              <input type="email" id="loginEmail" name="loginEmail" required />
            </div>
            <span class="error-message" id="loginEmailError"></span>
          </div>

          <div class="form-group">
            <label for="loginPassword">Password</label>
            <div class="input-wrapper">
              <i class="fas fa-lock"></i>
              <input type="password" id="loginPassword" name="loginPassword" required />
            </div>
            <span class="error-message" id="loginPasswordError"></span>
          </div>
        </div>

        <button type="submit" class="register-btn">Login</button>

        <div class="login-link">
          <p><a href="#" id="forgotPassword">Forgot password?</a></p>
        </div>
      </form>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
