<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard - Recruiter Approvals</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="registration-container">
    <div class="card">
      <h1>Admin Dashboard</h1>
      <p class="subtitle">Review and approve registrations</p>

      <div class="page-nav">
        <a class="nav-link" href="index.html"><i class="fas fa-user-tie"></i> Recruiter</a>
        <a class="nav-link" href="student.html"><i class="fas fa-user-graduate"></i> Student</a>
        <a class="nav-link" href="faculty.html"><i class="fas fa-chalkboard-teacher"></i> Faculty</a>
        <a class="nav-link active" href="admin.html"><i class="fas fa-shield-alt"></i> Admin</a>
      </div>

      <div class="tab-bar">
        <button class="tab-btn active" data-target="recruiters">Recruiters</button>
        <button class="tab-btn" data-target="faculty">Faculty</button>
        <button class="tab-btn" data-target="students">Students</button>
      </div>

      <div id="adminMessage" class="form-message" role="alert" aria-live="polite"></div>

      <div class="table-wrapper">
        <table id="registrationsTable">
          <thead>
            <tr id="tableHeader">
              <th>ID</th>
              <th>Company</th>
              <th>Recruiter</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Type</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="admin-footer">
        <a href="#" id="logoutLink">Logout</a> | <a href="index.html">Back to registration form</a>
      </div>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
