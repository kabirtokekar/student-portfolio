<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Faculty Registration</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="registration-container">
    <div class="card">
      <h1>Faculty Registration</h1>
      <p class="subtitle">Register to manage and resolve student complaints</p>

      <div class="page-nav">
        <a class="nav-link" href="index.html"><i class="fas fa-user-tie"></i> Recruiter</a>
        <a class="nav-link" href="student.html"><i class="fas fa-user-graduate"></i> Student</a>
        <a class="nav-link active" href="faculty.html"><i class="fas fa-chalkboard-teacher"></i> Faculty</a>
        <a class="nav-link" href="admin.html"><i class="fas fa-shield-alt"></i> Admin</a>
      </div>

      <form id="facultyForm">
        <div id="formMessage" class="form-message" role="alert" aria-live="polite"></div>

        <div class="form-section">
          <h3>Personal Details</h3>
          <div class="form-group">
            <label for="facultyFullName">Full Name <span class="required">*</span></label>
            <div class="input-wrapper">
              <i class="fas fa-user"></i>
              <input type="text" id="facultyFullName" name="facultyFullName" required />
            </div>
            <span class="error-message" id="facultyFullNameError"></span>
          </div>

          <div class="form-group">
            <label for="facultyEmail">Email <span class="required">*</span></label>
            <div class="input-wrapper">
              <i class="fas fa-envelope"></i>
              <input type="email" id="facultyEmail" name="facultyEmail" required />
            </div>
            <span class="error-message" id="facultyEmailError"></span>
          </div>

          <div class="form-group">
            <label for="employeeId">Employee ID <span class="required">*</span></label>
            <div class="input-wrapper">
              <i class="fas fa-id-badge"></i>
              <input type="text" id="employeeId" name="employeeId" required />
            </div>
            <span class="error-message" id="employeeIdError"></span>
          </div>

          <div class="form-group">
            <label for="department">Department</label>
            <div class="input-wrapper">
              <i class="fas fa-building"></i>
              <input type="text" id="department" name="department" placeholder="e.g., Computer Science" />
            </div>
            <span class="error-message" id="departmentError"></span>
          </div>

          <div class="form-group">
            <label for="facultyPassword">Password <span class="required">*</span></label>
            <div class="input-wrapper">
              <i class="fas fa-lock"></i>
              <input type="password" id="facultyPassword" name="facultyPassword" required />
            </div>
            <div class="password-strength" id="passwordStrength"></div>
            <span class="error-message" id="facultyPasswordError"></span>
          </div>

          <div class="form-group">
            <label for="facultyConfirmPassword">Confirm Password <span class="required">*</span></label>
            <div class="input-wrapper">
              <i class="fas fa-lock"></i>
              <input type="password" id="facultyConfirmPassword" name="facultyConfirmPassword" required />
            </div>
            <span class="error-message" id="facultyConfirmPasswordError"></span>
          </div>
        </div>

        <div class="security-notes">
          <div class="note">
            <i class="fas fa-shield-alt"></i>
            <span>Choose a strong password to protect your account.</span>
          </div>
          <div class="note">
            <i class="fas fa-user-check"></i>
            <span>Your registration will be reviewed and activated after approval.</span>
          </div>
        </div>

        <button type="submit" class="register-btn">Register</button>

        <div class="login-link">
          <p>Already registered? <a href="login.html">Login here</a></p>
        </div>
      </form>
    </div>
  </div>

  <script src="faculty.js"></script>
</body>
</html>
